<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Details | UniEvents</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">UniEvents</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto" id="navbar-links">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="events.html">Browse Events</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                    <li class="nav-item"><a class="nav-link btn btn-primary text-white ms-lg-3 px-3" href="auth.html">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div id="event-detail-content">
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-3 text-muted">Loading event details...</p>
            </div>
        </div>
    </div>

    <footer class="py-4 bg-dark">
        <div class="container">
            <p class="m-0 text-center text-white">Copyright &copy; UniEvents Team 2026</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        window.addEventListener('load', async () => {
            const params  = new URLSearchParams(window.location.search);
            const eventId = params.get('id');
            const container = document.getElementById('event-detail-content');

            if (!eventId) {
                container.innerHTML = `<div class="alert alert-danger">No event specified. <a href="events.html">Browse Events</a></div>`;
                return;
            }

            try {
                const data = await apiFetch(`/events/${eventId}`);
                renderFullDetails(data.event);
            } catch (err) {
                container.innerHTML = `<div class="alert alert-danger">Event not found. <a href="events.html">Browse Events</a></div>`;
            }
        });

        function renderFullDetails(event) {
            const container = document.getElementById('event-detail-content');
            const user = getUser();
            const loggedIn = isLoggedIn();

            container.innerHTML = `
                <div class="row">
                    <div class="col-lg-8">
                        <img src="${event.img}"
                             class="img-fluid rounded shadow mb-4"
                             style="width:100%; max-height:400px; object-fit:cover;"
                             onerror="this.src='https://via.placeholder.com/400x200?text=Event+Image'">
                        <h1 class="fw-bold">${event.title}</h1>
                        <span class="badge bg-primary fs-6 mb-3">${event.category}</span>
                        <hr>
                        <h3>About this Event</h3>
                        <p class="lead text-muted">${event.description || 'Join us for this exciting campus event. Bring your Student ID for entry.'}</p>
                        <div class="alert alert-info mt-4">
                            <strong>Note:</strong> Please bring your University Student ID for entry.
                        </div>
                    </div>
                    <div class="col-lg-4">
                        <div class="card shadow-sm border-0 p-4">
                            <h5 class="fw-bold">Event Info</h5>
                            <ul class="list-unstyled">
                                <li class="mb-2"><strong>Date:</strong> ${event.date}, 2026</li>
                                <li class="mb-2"><strong>Venue:</strong> ${event.venue}</li>
                                <li class="mb-2"><strong>Time:</strong> ${event.time || '09:00 AM'} onwards</li>
                                <li class="mb-2"><strong>Category:</strong> ${event.category}</li>
                            </ul>
                            ${loggedIn
                                ? `<button class="btn btn-success btn-lg w-100 mt-3" id="reg-btn" onclick="registerForEvent('${event._id}')">
                                       ✅ Confirm Registration
                                   </button>`
                                : `<a href="auth.html" class="btn btn-warning btn-lg w-100 mt-3">Login to Register</a>`
                            }
                            <a href="events.html" class="btn btn-link w-100 mt-2">← Back to Browse</a>
                        </div>
                    </div>
                </div>
            `;
        }

        async function registerForEvent(eventId) {
            const btn = document.getElementById('reg-btn');
            btn.disabled = true;
            btn.textContent = 'Registering...';
            try {
                const data = await apiFetch(`/events/${eventId}/register`, { method: 'POST' });
                alert(data.message);
                btn.textContent = '🎉 Registered!';
                btn.classList.replace('btn-success', 'btn-secondary');
            } catch (err) {
                alert(err.message);
                btn.disabled = false;
                btn.textContent = '✅ Confirm Registration';
            }
        }
    </script>
</body>
</html>
